name: Docker Hub repository description
description: Update a Docker Hub repository's short and full description from a markdown file.
author: Sergey Kanafyev

branding:
  icon: book-open
  color: blue

inputs:
  username:
    description: Docker Hub username
    required: true
  password:
    description: Docker Hub password (used to obtain a login token; a personal access token does not work for this endpoint)
    required: true
  repository:
    description: Docker Hub repository name (without the username, e.g. "workflow")
    required: true
  description-file:
    description: >
      Path to a markdown file. Its first line must be an HTML comment holding
      the short description, e.g. "<!-- short description -->"; the rest of
      the file (from the second line on) becomes the full description.
    required: false
    default: HUB.md
  url-completion:
    description: >
      Rewrite relative markdown links and image references in the full
      description to absolute GitHub URLs (images to "raw" links, other
      relative links to "blob" links), since Docker Hub renders the
      description outside the repository's context. Covers plain
      "![alt](path)" and "[label](path)" references; titled links/images,
      in-page anchors, and image-wrapped-in-link badges are left as-is.
    required: false
    default: "false"
  image-extensions:
    description: File extensions treated as images when url-completion is enabled.
    required: false
    default: bmp,gif,jpg,jpeg,png,svg,webp

runs:
  using: composite
  steps:
    - name: Update description
      shell: bash
      env:
        HUB_USERNAME: ${{ inputs.username }}
        HUB_PASSWORD: ${{ inputs.password }}
        HUB_REPOSITORY: ${{ inputs.repository }}
        HUB_FILE: ${{ inputs.description-file }}
        HUB_URL_COMPLETION: ${{ inputs.url-completion }}
        HUB_IMAGE_EXTS: ${{ inputs.image-extensions }}
        REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        REF_NAME: ${{ github.ref_name }}
      run: |
        token=$(curl -fsSL -X POST "https://hub.docker.com/v2/users/login" \
          -H "Content-Type: application/json" \
          -d "{\"username\":\"$HUB_USERNAME\",\"password\":\"$HUB_PASSWORD\"}" \
          | jq -r '.token')
        short_description=$(sed -n '1s/^<!-- \(.*\) -->$/\1/p' "$HUB_FILE")
        full_description=$(tail -n +2 "$HUB_FILE")
        if [ "$HUB_URL_COMPLETION" = "true" ]; then
          full_description=$(jq -n \
            --arg content "$full_description" \
            --arg exts "$(echo "$HUB_IMAGE_EXTS" | sed 's/,/|/g')" \
            --arg raw "$REPO_URL/raw/$REF_NAME/" \
            --arg blob "$REPO_URL/blob/$REF_NAME/" \
            -r '
              $content
              | gsub("(?<left>!\\[[^\\]]*\\])\\((?<url>[^:)#][^:)]*\\.(" + $exts + "))\\)"; "\(.left)(" + $raw + "\(.url))")
              | gsub("(?<left>(?<!!)\\[[^\\]]+\\])\\((?<url>[^:)#][^:)]*)\\)"; "\(.left)(" + $blob + "\(.url))")
            ')
        fi
        max_bytes=25000
        if [ "$(printf '%s' "$full_description" | wc -c)" -gt "$max_bytes" ]; then
          echo "::warning::Description exceeds Docker Hub's ${max_bytes}-byte limit and has been truncated."
          full_description=$(jq -n \
            --arg content "$full_description" \
            --argjson max "$max_bytes" \
            -r '
              def utf8len:
                explode | map(if . < 128 then 1 elif . < 2048 then 2 elif . < 65536 then 3 else 4 end) | add // 0;
              def truncate_bytes(n):
                if (. | utf8len) <= n then .
                else . as $s | first(range(n; -1; -1) as $k | $s[0:$k] | select((. | utf8len) <= n))
                end;
              $content | truncate_bytes($max)
            ')
        fi
        curl -fsSL -X PATCH "https://hub.docker.com/v2/repositories/$HUB_USERNAME/$HUB_REPOSITORY/" \
          -H "Authorization: Bearer $token" \
          -H "Content-Type: application/json" \
          --data-binary "$(jq -n \
            --arg description "$short_description" \
            --arg full_description "$full_description" \
            '{description: $description, full_description: $full_description}')"
